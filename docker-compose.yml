# sin version: innecesario desde Compose v2

volumes:
  mysql_data:

services:
  sqldb:
    image: mysql:5.7
    container_name: helper-mysql
    ports:
      - "3307:3306" # <--- AÑADE ESTA LÍNEA para exponer MySQL al VPS en el puerto 3307
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=helper
      - MYSQL_USER=helper
      - MYSQL_PASSWORD=helper
      - MYSQL_ROOT_PASSWORD=helper
    command: --default-storage-engine innodb
    restart: unless-stopped
    healthcheck:
      test: mysqladmin -p$$MYSQL_ROOT_PASSWORD ping -h localhost
      interval: 20s
      start_period: 10s
      timeout: 10s
      retries: 3
  helper:
    image: raynorman/helper:latest
    container_name: helper-server
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=sqldb
      - DB_PORT=3306
      - DB_DATABASE=helper
      - DB_USERNAME=helper
      - DB_PASSWORD=helper
      - MAIL_MAILER=smtp
      - MAIL_HOST=smtp.mailtrap.io
      - MAIL_PORT=2525
      - MAIL_USERNAME=your_username
      - MAIL_PASSWORD=your_password
      - MAIL_ENCRYPTION=tls
      - APP_URL=https://servenvicava.com # Asegúrate de tener esto también
      - ASSET_URL=https://servenvicava.com
      - APP_ENV=production # Opcional
    depends_on:
      sqldb:
        condition: service_healthy
    restart: "unless-stopped" # O 'unless-stopped'
    ports:
      - 8001:8000
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./src:/var/www/html # O .:/var/www/html si el código está en la raíz
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
